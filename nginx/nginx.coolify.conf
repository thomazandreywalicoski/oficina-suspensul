worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Domínio principal: oficinasuspensul.com.br
    # Landing page + rotas públicas do Flask
    server {
        listen 80;
        server_name oficinasuspensul.com.br www.oficinasuspensul.com.br _;

        # Uploads servidos diretamente pelo nginx
        location /uploads/ {
            alias /usr/share/nginx/uploads/;
        }

        # Rotas públicas do Flask (cotações, orçamentos, comprovantes)
        location /solicitacao-orcamento/ {
            proxy_pass http://app:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /orcamento/ {
            proxy_pass http://app:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /comprovante-pagamento/ {
            proxy_pass http://app:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static files do Flask
        location /static/ {
            proxy_pass http://app:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Landing page (arquivos estáticos) — fallback
        location / {
            root /usr/share/nginx/landing;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }

    # Subdomínio: gerenciamento.oficinasuspensul.com.br
    # Tudo vai para o Flask app
    server {
        listen 80;
        server_name gerenciamento.oficinasuspensul.com.br;

        location /uploads/ {
            alias /usr/share/nginx/uploads/;
        }

        location / {
            proxy_pass http://app:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
