worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # ── Landing page: oficinasuspensul.com.br ──
    server {
        listen 80;
        server_name oficinasuspensul.com.br www.oficinasuspensul.com.br localhost;

        # Rotas públicas do gerenciamento (cotações, orçamentos, comprovantes)
        location /solicitacao-orcamento/ {
            proxy_pass http://app:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /orcamento/ {
            proxy_pass http://app:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /comprovante-pagamento/ {
            proxy_pass http://app:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Uploads do gerenciamento
        location /uploads/ {
            alias /usr/share/nginx/uploads/;
        }

        # Landing page (arquivos estáticos)
        location / {
            root /usr/share/nginx/landing;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }

    # ── Gerenciamento local (desenvolvimento): localhost:1221 ──
    server {
        listen 1221;
        server_name _;

        location / {
            proxy_pass http://app:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            alias /usr/share/nginx/uploads/;
        }
    }

    # ── Gerenciamento: gerenciamento.oficinasuspensul.com.br ──
    server {
        listen 80;
        server_name gerenciamento.oficinasuspensul.com.br;

        location / {
            proxy_pass http://app:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            alias /usr/share/nginx/uploads/;
        }
    }
}
