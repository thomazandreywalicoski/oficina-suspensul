upstream gerenciamento_app {
    server app:5000;
}

upstream landing_page {
    server landing:80;
}

server {
    listen 80;
    server_name oficinasuspensul.com.br www.oficinasuspensul.com.br;

    # Cotações (pré-orçamento) — rota pública
    location /solicitacao-orcamento/ {
        proxy_pass http://gerenciamento_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Orçamentos — rota pública
    location /orcamento/ {
        proxy_pass http://gerenciamento_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Comprovantes de pagamento — rota pública
    location /comprovante-pagamento/ {
        proxy_pass http://gerenciamento_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets do gerenciamento (CSS, JS) — necessário para páginas públicas
    location /static/ {
        proxy_pass http://gerenciamento_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Uploads do gerenciamento (imagens de veículos, logos etc.)
    location /uploads/ {
        proxy_pass http://gerenciamento_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Todo o resto — landing page
    location / {
        proxy_pass http://landing_page;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name gerenciamento.oficinasuspensul.com.br;

    location / {
        proxy_pass http://gerenciamento_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
