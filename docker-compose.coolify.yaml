services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./gerenciamento-oficina-suspensul/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - default

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
      UPLOAD_LIMIT: 100M
    depends_on:
      - mysql
    networks:
      - default

  app:
    build: ./gerenciamento-oficina-suspensul
    restart: unless-stopped
    env_file:
      - ./gerenciamento-oficina-suspensul/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      FLASK_ENV: production
    depends_on:
      - mysql
    volumes:
      - uploads_data:/app/static/uploads
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      # Gerenciamento no subdomínio
      - "traefik.http.routers.suspensul_gerenciamento.rule=Host(`gerenciamento.oficinasuspensul.com.br`)"
      - "traefik.http.routers.suspensul_gerenciamento.entryPoints=http,https"
      - "traefik.http.routers.suspensul_gerenciamento.tls.certresolver=letsencrypt"
      - "traefik.http.services.suspensul_gerenciamento.loadbalancer.server.port=5000"
      # Rotas públicas no domínio principal
      - "traefik.http.routers.suspensul_public.rule=Host(`oficinasuspensul.com.br`) && (PathPrefix(`/solicitacao-orcamento`) || PathPrefix(`/orcamento`) || PathPrefix(`/comprovante-pagamento`) || PathPrefix(`/uploads`) || PathPrefix(`/static`))"
      - "traefik.http.routers.suspensul_public.entryPoints=http,https"
      - "traefik.http.routers.suspensul_public.tls.certresolver=letsencrypt"
      - "traefik.http.services.suspensul_public.loadbalancer.server.port=5000"

  landing:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./landing-page-oficina-suspensul:/usr/share/nginx/html:ro
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.suspensul_landing.rule=Host(`oficinasuspensul.com.br`) && !PathPrefix(`/solicitacao-orcamento`) && !PathPrefix(`/orcamento`) && !PathPrefix(`/comprovante-pagamento`) && !PathPrefix(`/uploads`) && !PathPrefix(`/static`)"
      - "traefik.http.routers.suspensul_landing.entryPoints=http,https"
      - "traefik.http.routers.suspensul_landing.tls.certresolver=letsencrypt"
      - "traefik.http.services.suspensul_landing.loadbalancer.server.port=80"

volumes:
  mysql_data:
  uploads_data:

networks:
  coolify:
    external: true
