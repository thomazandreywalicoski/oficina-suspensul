# Docker Compose para deploy no Coolify
# O Coolify usa Traefik como reverse proxy com SSL automático
# Configure no Coolify:
#   - oficinasuspensul.com.br → suspensul_nginx:80
#   - gerenciamento.oficinasuspensul.com.br → suspensul_app:5000

services:
  mysql:
    image: mysql:8.0
    container_name: suspensul_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./gerenciamento-oficina-suspensul/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - suspensul_net

  app:
    build: ./gerenciamento-oficina-suspensul
    container_name: suspensul_app
    restart: unless-stopped
    env_file:
      - ./gerenciamento-oficina-suspensul/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      FLASK_ENV: production
    expose:
      - "5000"
    depends_on:
      - mysql
    volumes:
      - uploads_data:/app/static/uploads
    networks:
      - suspensul_net

  nginx:
    image: nginx:alpine
    container_name: suspensul_nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
      - ./landing-page-oficina-suspensul:/usr/share/nginx/landing:ro
      - uploads_data:/usr/share/nginx/uploads:ro
    depends_on:
      - app
    networks:
      - suspensul_net

volumes:
  mysql_data:
  uploads_data:

networks:
  suspensul_net:
    driver: bridge
