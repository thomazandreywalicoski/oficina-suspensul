services:
  mysql:
    image: mysql:8.0
    container_name: suspensul_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./gerenciamento-oficina-suspensul/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: suspensul_phpmyadmin
    restart: unless-stopped
    ports:
      - "3801:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
      UPLOAD_LIMIT: 100M
    depends_on:
      - mysql

  app:
    build: ./gerenciamento-oficina-suspensul
    container_name: suspensul_app
    restart: unless-stopped
    env_file:
      - ./gerenciamento-oficina-suspensul/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      FLASK_ENV: production
    depends_on:
      - mysql
    volumes:
      - uploads_data:/app/static/uploads
    ports:
      - "5000:5000"

  landing:
    image: nginx:alpine
    container_name: suspensul_landing
    restart: unless-stopped
    volumes:
      - ./landing-page-oficina-suspensul:/usr/share/nginx/html:ro
    ports:
      - "8080:80"

  proxy:
    build: ./nginx
    container_name: suspensul_proxy
    restart: unless-stopped
    volumes:
      - uploads_data:/usr/share/nginx/uploads:ro
    depends_on:
      - app
    ports:
      - "5001:80"

volumes:
  mysql_data:
  uploads_data:
