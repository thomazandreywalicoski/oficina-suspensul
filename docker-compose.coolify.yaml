services:
  mysql:
    image: mysql:8.0
    container_name: suspensul_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./gerenciamento-oficina-suspensul/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: suspensul_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
      UPLOAD_LIMIT: 100M
    depends_on:
      - mysql
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.suspensul_phpmyadmin.rule=Host(`phpmyadmin.oficinasuspensul.com.br`)"
      - "traefik.http.routers.suspensul_phpmyadmin.entryPoints=http"
      - "traefik.http.services.suspensul_phpmyadmin.loadbalancer.server.port=80"
      - "traefik.docker.network=coolify"

  app:
    build: ./gerenciamento-oficina-suspensul
    container_name: suspensul_app
    restart: unless-stopped
    env_file:
      - ./gerenciamento-oficina-suspensul/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      FLASK_ENV: production
    depends_on:
      - mysql
    volumes:
      - uploads_data:/app/static/uploads

  landing:
    image: nginx:alpine
    container_name: suspensul_landing
    restart: unless-stopped
    volumes:
      - ./landing-page-oficina-suspensul:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.suspensul_landing.rule=Host(`oficinasuspensul.com.br`)"
      - "traefik.http.routers.suspensul_landing.entryPoints=http"
      - "traefik.http.routers.suspensul_landing.priority=1"
      - "traefik.http.services.suspensul_landing.loadbalancer.server.port=80"
      - "traefik.docker.network=coolify"

  # Nginx proxy para Flask — rotas públicas no domínio principal + subdomínio gerenciamento
  proxy:
    build: ./nginx
    container_name: suspensul_proxy
    restart: unless-stopped
    volumes:
      - uploads_data:/usr/share/nginx/uploads:ro
    depends_on:
      - app
    labels:
      - "traefik.enable=true"
      # Rotas públicas no domínio principal (prioridade alta para sobrepor landing)
      - "traefik.http.routers.suspensul_public.rule=Host(`oficinasuspensul.com.br`) && (PathPrefix(`/solicitacao-orcamento/`) || PathPrefix(`/orcamento/`) || PathPrefix(`/comprovante-pagamento/`) || PathPrefix(`/uploads/`) || PathPrefix(`/static/`))"
      - "traefik.http.routers.suspensul_public.entryPoints=http"
      - "traefik.http.routers.suspensul_public.priority=10"
      - "traefik.http.services.suspensul_public.loadbalancer.server.port=80"
      # Gerenciamento no subdomínio
      - "traefik.http.routers.suspensul_gerenciamento.rule=Host(`gerenciamento.oficinasuspensul.com.br`)"
      - "traefik.http.routers.suspensul_gerenciamento.entryPoints=http"
      - "traefik.http.routers.suspensul_gerenciamento.priority=5"
      - "traefik.http.services.suspensul_gerenciamento.loadbalancer.server.port=80"
      - "traefik.docker.network=coolify"

volumes:
  mysql_data:
  uploads_data:
