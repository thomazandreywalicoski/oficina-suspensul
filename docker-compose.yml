version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: suspensul_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: suspensul123
      MYSQL_DATABASE: oficina_suspensul
      MYSQL_USER: suspensul
      MYSQL_PASSWORD: suspensul123
    ports:
      - "3802:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - suspensul_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: suspensul_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: suspensul123
      UPLOAD_LIMIT: 100M
    ports:
      - "3801:80"
    depends_on:
      - mysql
    networks:
      - suspensul_net

  app:
    build: .
    container_name: suspensul_app
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: suspensul
      DB_PASSWORD: suspensul123
      DB_NAME: oficina_suspensul
      FLASK_ENV: production
    ports:
      - "3800:5000"
    depends_on:
      - mysql
    volumes:
      - ./static/uploads:/app/static/uploads
    networks:
      - suspensul_net

volumes:
  mysql_data:

networks:
  suspensul_net:
    driver: bridge
