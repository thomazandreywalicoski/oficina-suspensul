version: '3.8'

services:
  nginx:
    build: ./nginx
    container_name: suspensul_nginx
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - gerenciamento-app
      - landing-page
    networks:
      - default
      - suspensul_internal

  landing-page:
    build: ./landing-page-oficina-suspensul
    container_name: suspensul_landing
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - suspensul_internal

  gerenciamento-app:
    build: ./gerenciamento-oficina-suspensul
    container_name: suspensul_app
    restart: unless-stopped
    expose:
      - "5000"
    env_file:
      - ./gerenciamento-oficina-suspensul/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: suspensul
      DB_PASSWORD: "!OFICINAsuspensul@MYSQL2026!"
      DB_NAME: oficina_suspensul
      FLASK_ENV: production
    depends_on:
      - mysql
    volumes:
      - ./gerenciamento-oficina-suspensul/static/uploads:/app/static/uploads
    networks:
      - suspensul_internal

  mysql:
    image: mysql:8.0
    container_name: suspensul_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "!OFICINAsuspensul@MYSQL2026!"
      MYSQL_DATABASE: oficina_suspensul
      MYSQL_USER: suspensul
      MYSQL_PASSWORD: "!OFICINAsuspensul@MYSQL2026!"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./gerenciamento-oficina-suspensul/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - suspensul_internal

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: suspensul_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: "!OFICINAsuspensul@MYSQL2026!"
      UPLOAD_LIMIT: 100M
    expose:
      - "80"
    depends_on:
      - mysql
    networks:
      - suspensul_internal

volumes:
  mysql_data:

networks:
  suspensul_internal:
    driver: bridge
