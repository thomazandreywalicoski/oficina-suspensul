services:
  nginx:
    build: ./nginx
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - app
      - landing
    networks:
      - suspensul_net

  landing:
    build: ./landing-page-oficina-suspensul
    restart: unless-stopped
    networks:
      - suspensul_net

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: suspensul_root_2026
      MYSQL_DATABASE: oficina_suspensul
      MYSQL_USER: suspensul
      MYSQL_PASSWORD: suspensul_db_2026
    volumes:
      - mysql_data:/var/lib/mysql
      - ./gerenciamento-oficina-suspensul/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - suspensul_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: suspensul_root_2026
      UPLOAD_LIMIT: 100M
    ports:
      - "3801:80"
    depends_on:
      - mysql
    networks:
      - suspensul_net

  app:
    build: ./gerenciamento-oficina-suspensul
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: suspensul
      DB_PASSWORD: suspensul_db_2026
      DB_NAME: oficina_suspensul
      FLASK_ENV: production
      PUBLIC_BASE_URL: https://oficinasuspensul.com.br
      # Segredos — configure no Coolify (Environment Variables):
      # SECRET_KEY, SESSION_COOKIE_SECURE, ADMIN_EMAIL, ADMIN_PASSWORD,
      # LOGIN_MAX_ATTEMPTS, LOGIN_LOCK_SECONDS
    depends_on:
      - mysql
    volumes:
      - ./gerenciamento-oficina-suspensul/static/uploads:/app/static/uploads
    networks:
      - suspensul_net

volumes:
  mysql_data:

networks:
  suspensul_net:
    driver: bridge
